function loadState(){
  const s = localStorage.getItem('sf_state');
  if(s) {
    const loaded = JSON.parse(s);
    state = {...state, ...loaded};
    state.exploredCountries = new Set(loaded.exploredCountries||[]);
  }
  // Streak
  const today = new Date().toDateString();
  if(state.lastLogin && state.lastLogin !== today) {
    const yesterday = new Date(Date.now()-86400000).toDateString();
    state.streak = state.lastLogin === yesterday ? state.streak + 1 : 1;
  }
  state.lastLogin = today;
  saveState();
}

function saveState(){
  const s2 = {...state, exploredCountries: [...state.exploredCountries]};
  localStorage.setItem('sf_state', JSON.stringify(s2));
}

function bootApp(){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));

// ====== ANALYZER ======
function populateCareerSelect(){

  sel.innerHTML = Object.keys(careersDB).sort().map(k=>`<option value="${k}"${k===state.targetCareer?' selected':''}>${k}</option>`).join('');

function updateCareerSkills(){ state.targetCareer = document.getElementById('career-select').value; saveState(); updateSidebar(); }
function dzDrag(e,on){ e.preventDefault(); document.getElementById('dropzone').classList.toggle('drag',on); }
function dzDrop(e){ e.preventDefault(); dzDrag(e,false); if(e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); }
function handleFile(inp){ if(inp.files[0]) processFile(inp.files[0]); }
function processFile(file){
  const icon = document.getElementById('dz-icon');
  const txt = document.getElementById('dz-text');
  icon.className='fa-solid fa-circle-notch fa-spin'; icon.style.color='var(--primary)';
  txt.textContent = `Parsing ${file.name}...`;
  setTimeout(()=>{
    const required = careersDB[state.targetCareer]||[];
    const extracted = [...new Set(required.sort(()=>Math.random()-.5).slice(0,Math.ceil(required.length*.4)))];
    const cur = document.getElementById('skills-input').value;
    const all = [...new Set([...cur.split(',').map(s=>s.trim()).filter(Boolean),...extracted])];
    document.getElementById('skills-input').value = all.join(', ');
    icon.className='fa-solid fa-circle-check'; icon.style.color='var(--green)';
    txt.textContent = `✓ Extracted ${extracted.length} skills from ${file.name}`;
    showToast(`Resume parsed! Found ${extracted.length} skills.`);
  },2200);
}
function runAnalysis(){
  const target = document.getElementById('career-select').value;
  const raw = document.getElementById('skills-input').value;
  if(!raw.trim()){ showToast('Please enter your skills first!'); return; }
  const userSkills = raw.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean);
  const required = careersDB[target]||[];
  const present=[],missing=[];
  required.forEach(r=>{ if(userSkills.some(u=>u.includes(r.toLowerCase())||r.toLowerCase().includes(u))) present.push(r); else missing.push(r); });
  const score = Math.round((present.length/required.length)*100);
  state.analysis = {target,present,missing,score};
  state.userSkills = userSkills;
  state.targetCareer = target;
  saveState(); updateSidebar();
  document.getElementById('analysis-result').style.display='block';
  document.getElementById('res-role').textContent = target+' — Skill Matrix';
  const scoreEl = document.getElementById('res-score');
  scoreEl.textContent = score+'%';
  scoreEl.style.color = score>=70?'var(--green)':score>=40?'var(--warn)':'var(--danger)';
  document.getElementById('matched-skills').innerHTML = present.map(s=>`<span class="tag tag-green" style="margin:3px 3px 3px 0;display:inline-block">${s}</span>`).join('')||'<span style="color:var(--muted);font-size:13px">No matches yet</span>';
  document.getElementById('missing-skills').innerHTML = missing.map(s=>`<span class="tag" style="background:rgba(244,67,54,.1);color:#f87171;border:1px solid rgba(244,67,54,.3);margin:3px 3px 3px 0;display:inline-block">${s}</span>`).join('')||'<span style="color:var(--green);font-size:13px">🎉 All skills matched!</span>';
  // Radar
  const ctx2 = document.getElementById('radar-chart').getContext('2d');
  if(radarChart) radarChart.destroy();
  radarChart = new Chart(ctx2,{type:'radar',data:{labels:required,datasets:[{label:'Your Skills',data:required.map(r=>present.includes(r)?90:15),borderColor:'#00d4ff',backgroundColor:'rgba(0,212,255,.15)',borderWidth:2,pointBackgroundColor:'#00d4ff'},{label:'Required',data:required.map(()=>100),borderColor:'#7c3aed',backgroundColor:'rgba(124,58,237,.05)',borderDash:[5,5],borderWidth:1,pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,scales:{r:{ticks:{display:false},angleLines:{color:'rgba(255,255,255,.05)'},grid:{color:'rgba(255,255,255,.05)'},pointLabels:{color:'#94a3b8',font:{size:10,weight:'bold'}}}},plugins:{legend:{labels:{color:'#94a3b8',boxWidth:10}}}}});
  showToast('Analysis complete! 🧬');
  checkBadge('b_analyzed');
  if(score>=50) checkBadge('b_half');
  if(score>=80){ checkBadge('b_full'); launchConfetti(); }
}

  ${state.analysis.missing.map((skill,i)=>{

    const urls={Coursera:`https://coursera.org/search?query=${q}`,Udemy:`https://udemy.com/courses/search/?q=${q}`,edX:`https://edx.org/search?q=${q}`,YouTube:`https://youtube.com/results?search_query=${q}`,freeCodeCamp:`https://freecodecamp.org/news/search/?query=${q}`};

  }).join('')}`;

      return`<div class="job-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
      <h3 style="font-weight:700;font-size:14px;flex:1">${state.targetCareer} — ${['Senior','Lead','Staff','Associate','Principal'][i%5]}</h3>
      <span class="tag tag-green">${match}% match</span></div>
      <div style="font-size:12px;color:var(--muted);font-weight:600;margin-bottom:8px"><i class="fa-solid fa-building" style="margin-right:6px"></i>${co} <span style="margin:0 6px">•</span><i class="fa-solid fa-location-dot" style="margin-right:4px"></i>${locs[country]||'Remote'}</div>
      <p style="font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:12px">Looking for an experienced ${state.targetCareer} to join our core engineering team. Strong problem-solving skills required.</p>
      <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(255,255,255,0.05);padding-top:12px">
      <span style="font-size:13px;font-weight:700;color:#fff">₹${sal}k–₹${sal+30}k</span>
      <a href="https://linkedin.com/jobs" target="_blank" class="btn-primary" style="font-size:12px;padding:8px 16px;text-decoration:none">Apply <i class="fa-solid fa-arrow-up-right-from-square" style="margin-left:4px;font-size:10px"></i></a>
      </div></div>`;
    }).join('');
  }
}

// ====== QUIZ ======
function startQuiz(fullscreen){
  quizIdx=0; quizScore=0; selectedOpt=null;
  quizQ = [...quizBank].sort(()=>Math.random()-.5).slice(0,5);
  document.getElementById('quiz-intro').style.display='none';
  document.getElementById('quiz-active').style.display='block';
  document.getElementById('quiz-results').style.display='none';
  const go=()=>{ loadQQuestion(); };
  if(fullscreen && document.documentElement.requestFullscreen){
    document.documentElement.requestFullscreen().then(go).catch(go);
  } else { go(); }
}
function loadQQuestion(){
  selectedOpt=null;
  const q=quizQ[quizIdx];
  document.getElementById('q-progress').textContent=`Question ${quizIdx+1} of ${quizQ.length}`;
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('q-cat').textContent=q.cat;
  document.getElementById('q-options').innerHTML=q.opts.map((o,i)=>`<div class="quiz-opt" id="qo-${i}" onclick="selectOpt(${i})">${o}</div>`).join('');
  const btn=document.getElementById('q-next-btn');
  btn.disabled=true; btn.style.opacity='.4'; btn.style.cursor='not-allowed';
  btn.textContent = quizIdx===quizQ.length-1 ? 'Finish Quiz ✓' : 'Next Question →';
  // Timer
  if(quizTimer) clearInterval(quizTimer);
  let t=30;
  document.getElementById('q-timer').textContent='00:30';
  document.getElementById('q-timer').style.color='var(--primary)';
  quizTimer = setInterval(()=>{
    t--;
    document.getElementById('q-timer').textContent=`00:${String(t).padStart(2,'0')}`;
    if(t<=10) document.getElementById('q-timer').style.color='var(--danger)';
    if(t<=0){ clearInterval(quizTimer); nextQuestion(); }
  },1000);
}
function selectOpt(i){
  if(selectedOpt!==null) return;
  selectedOpt=i;
  document.querySelectorAll('.quiz-opt').forEach(o=>o.style.pointerEvents='none');
  const correct=quizQ[quizIdx].ans;
  document.getElementById(`qo-${i}`).classList.add(i===correct?'correct':'wrong');
  if(i!==correct) document.getElementById(`qo-${correct}`).classList.add('correct');
  if(i===correct) quizScore++;
  const btn=document.getElementById('q-next-btn');
  btn.disabled=false; btn.style.opacity='1'; btn.style.cursor='pointer';
}
function nextQuestion(){
  if(quizTimer) clearInterval(quizTimer);
  quizIdx++;
  if(quizIdx>=quizQ.length) finishQuiz();
  else { document.getElementById('q-options').innerHTML=''; loadQQuestion(); }
}
function finishQuiz(){
  if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  document.getElementById('quiz-active').style.display='none';
  document.getElementById('quiz-results').style.display='block';
  const perc=Math.round((quizScore/quizQ.length)*100);
  state.quizScores.push(perc); if(state.quizScores.length>30)state.quizScores.shift();
  saveState();
  document.getElementById('r-icon').textContent=perc>=80?'🏆':perc>=60?'⭐':'💪';
  document.getElementById('r-title').textContent=perc===100?'Perfect Score!':perc>=80?'Outstanding!':perc>=60?'Great Work!':'Keep Practicing!';
  document.getElementById('r-score').textContent=perc+'%';
  document.getElementById('r-desc').textContent=`${quizScore} of ${quizQ.length} correct answers`;
  if(perc>=60) launchConfetti();
  checkBadge('b_quiz1');
  if(perc===100) checkBadge('b_quiz_ace');
}
function restartQuiz(){
  document.getElementById('quiz-intro').style.display='block';
  document.getElementById('quiz-active').style.display='none';
  document.getElementById('quiz-results').style.display='none';
}

// ====== BADGES ======
function checkBadge(id){ if(!localStorage.getItem(id)){ localStorage.setItem(id,'true'); } }
function renderBadges(){
  document.getElementById('badges-container').innerHTML = allBadges.map(b=>{
    const unlocked=localStorage.getItem(b.id)==='true';
    return`<div class="badge-card ${unlocked?'unlocked':'locked'}"><div class="badge-emoji">${b.emoji}</div><div class="badge-name">${b.name}</div><div class="badge-desc">${unlocked?'✓ Unlocked':b.desc}</div></div>`;
  }).join('');
}

// ====== SETTINGS ======
function refreshSettings(){
  document.getElementById('set-email').textContent = state.email;
  document.getElementById('set-career').textContent = state.targetCareer;
  const k = localStorage.getItem('gk')||'';
  document.getElementById('gemini-key-inp').value = k;
  document.getElementById('key-status').textContent = k ? '✓ API key saved and active' : 'No key set';
  document.getElementById('key-status').style.color = k ? 'var(--green)' : 'var(--muted)';
}
function saveGeminiKey(){
  const k = document.getElementById('gemini-key-inp').value.trim();
  if(k){ localStorage.setItem('gk',k); document.getElementById('key-status').textContent='✓ API key saved'; document.getElementById('key-status').style.color='var(--green)'; showToast('Gemini API key saved! 🤖'); }
}
function clearData(){ if(confirm('Clear all your data and log out?')){ localStorage.clear(); location.reload(); } }

// ====== CHATBOT ======
function toggleChat(){
  const win=document.getElementById('chatbot-win');
  const icon=document.getElementById('chat-fab-icon');
  state.chatOpen=!state.chatOpen;
  win.classList.toggle('show',state.chatOpen);
  icon.className=state.chatOpen?'fa-solid fa-xmark':'fa-solid fa-robot';
  if(state.chatOpen && document.getElementById('chat-msgs').children.length===0){
    const k=localStorage.getItem('gk');
    if(!k){
      addMsg('bot',`👋 Hi ${state.name.split(' ')[0]}! I'm <strong>Forge AI</strong>, powered by Gemini.<br><br>To activate me, go to <strong>Settings → API Key</strong> and add your free <a href="https://aistudio.google.com" target="_blank" style="color:var(--primary)">Gemini API key</a>.`);
    } else {
      addMsg('bot',`👋 Hello ${state.name.split(' ')[0]}! I'm Forge AI. I see you're targeting <strong>${state.targetCareer}</strong>. How can I help you today?`);
    }
  }
}
function addMsg(from,html){
  const div=document.createElement('div');
  div.className=from==='bot'?'msg-bot':'msg-user';
  div.innerHTML=html;
  document.getElementById('chat-msgs').appendChild(div);
  document.getElementById('chat-msgs').scrollTop=9999;
}
async function sendMsg(){
  const inp=document.getElementById('chat-inp');
  const text=inp.value.trim();
  if(!text) return;
  const k=localStorage.getItem('gk');
  if(!k){ showToast('Add Gemini API key in Settings first!'); return; }
  inp.value='';
  addMsg('user',text);
  const loader=`<div id="typing-ind" class="msg-bot" style="padding:10px 14px"><span class="spin" style="width:14px;height:14px;border-width:2px"></span></div>`;
  document.getElementById('chat-msgs').insertAdjacentHTML('beforeend',loader);
  document.getElementById('chat-msgs').scrollTop=9999;
  try{
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${k}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:`You are Forge AI, a friendly, expert engineering career counselor. The user's name is ${state.name}, targeting ${state.targetCareer}. Be concise, encouraging and practical. User says: ${text}`}]}],generationConfig:{temperature:.7,maxOutputTokens:250}})
    });
    document.getElementById('typing-ind')?.remove();
    if(!r.ok) throw new Error(r.status);
    const data=await r.json();
    let reply=data.candidates?.[0]?.content?.parts?.[0]?.text||'Sorry, I had trouble responding.';
    reply=reply.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');
    addMsg('bot',reply);
  }catch(e){
    document.getElementById('typing-ind')?.remove();
    addMsg('bot',`<span style="color:var(--danger)">⚠ Error connecting to Gemini. Please check your API key in Settings.</span>`);
    localStorage.removeItem('gk');
  }
}

// ====== UTILITIES ======
function showToast(msg, duration=3000){
  const t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),duration);
}
function launchConfetti(){
  const end=Date.now()+2500;
  (function f(){
    confetti({particleCount:6,angle:60,spread:55,origin:{x:0},colors:['#00d4ff','#7c3aed','#00e676']});
    confetti({particleCount:6,angle:120,spread:55,origin:{x:1},colors:['#00d4ff','#7c3aed','#f472b6']});
    if(Date.now()<end) requestAnimationFrame(f);
  })();
}
function initBg(){
  const canvas=document.getElementById('bg-canvas');
  if(!window.THREE) return;
  const scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x050d1a,0.0025);
  const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,1000);
  camera.position.z=180;
  const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  const geo=new THREE.BufferGeometry();
  const cnt=300, pos=new Float32Array(cnt*3);
  for(let i=0;i<cnt*3;i++) pos[i]=(Math.random()-.5)*600;
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const tc=document.createElement('canvas'); tc.width=tc.height=16;
  const ctx2=tc.getContext('2d');
  const gr=ctx2.createRadialGradient(8,8,0,8,8,8);
  gr.addColorStop(0,'rgba(255,255,255,1)'); gr.addColorStop(.3,'rgba(0,212,255,1)'); gr.addColorStop(.7,'rgba(124,58,237,.5)'); gr.addColorStop(1,'rgba(0,0,0,0)');
  ctx2.fillStyle=gr; ctx2.fillRect(0,0,16,16);
  const mat=new THREE.PointsMaterial({size:5,map:new THREE.CanvasTexture(tc),transparent:true,blending:THREE.AdditiveBlending,depthWrite:false});
  scene.add(new THREE.Points(geo,mat));
  window.addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
  (function animate(){ requestAnimationFrame(animate); scene.rotation.y+=.0004; scene.rotation.x+=.0002; renderer.render(scene,camera); })();
}
</script>
